<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Добро пожаловать</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #a855f7;
      --purple-dim: #7c3aed;
      --purple-glow: rgba(168,85,247,0.45);
      --bg: #080810;
      --surface: #0f0f1a;
      --text: #e2d9f3;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      overflow-x: hidden;
    }

    /* ── MAIN PAGE ── */
    #main-page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* subtle radial bg */
    #main-page::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(120,40,200,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── WELCOME TEXT ── */
    .welcome {
      position: relative;
      z-index: 1;
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.6rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      color: #fff;
      text-shadow:
        0 0 18px var(--purple-glow),
        0 0 50px rgba(168,85,247,0.25);
      padding: 0 1rem;
    }

    /* ── WAVY LINE SVG ── */
    .wave-wrap {
      position: relative;
      z-index: 1;
      width: min(700px, 92vw);
      margin-top: 2.4rem;
      overflow: visible;
    }

    .wave-svg {
      width: 100%;
      display: block;
      filter: drop-shadow(0 0 8px var(--purple)) drop-shadow(0 0 22px rgba(168,85,247,0.5));
    }

    .wave-path {
      fill: none;
      stroke: var(--purple);
      stroke-width: 3;
      stroke-linecap: round;
    }

    /* Animated dash offset — JS sets the total length on load */
    .wave-path {
      stroke-dasharray: var(--wave-len, 2000);
      stroke-dashoffset: var(--wave-len, 2000);
      animation: drawWave 2.6s cubic-bezier(.4,0,.2,1) forwards;
    }

    @keyframes drawWave {
      to { stroke-dashoffset: 0; }
    }

    /* ── CREATOR BUTTON (top-right) ── */
    .btn-creator {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      background: transparent;
      border: 1.5px solid var(--purple);
      color: var(--purple);
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      padding: 0.5rem 1.1rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 8px var(--purple-glow);
    }
    .btn-creator:hover {
      background: var(--purple);
      color: #fff;
      box-shadow: 0 0 18px var(--purple), 0 0 40px rgba(168,85,247,0.4);
    }

    /* ── OVERLAY (fullscreen modal) ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(8,8,16,0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      position: relative;
    }

    /* close btn */
    .btn-close {
      position: absolute;
      top: -3rem;
      right: -1rem;
      background: none;
      border: none;
      color: var(--purple);
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .btn-close:hover {
      color: #fff;
      text-shadow: 0 0 10px var(--purple);
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--purple-dim);
      border-radius: 2rem;
      overflow: hidden;
      margin-bottom: 0.4rem;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      padding: 0.45rem 1.3rem;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }
    .tab-btn.active {
      background: var(--purple-dim);
      color: #fff;
    }

    /* TAB PANELS */
    .tab-panel { display: none; flex-direction: column; align-items: center; gap: 1.4rem; }
    .tab-panel.active { display: flex; }

    /* AVATAR */
    .avatar {
      width: clamp(110px, 30vw, 150px);
      height: clamp(110px, 30vw, 150px);
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--purple);
      box-shadow: 0 0 20px var(--purple-glow), 0 0 50px rgba(168,85,247,0.25);
      animation: pulseAvatar 3s ease-in-out infinite;
    }
    @keyframes pulseAvatar {
      0%,100% { box-shadow: 0 0 20px var(--purple-glow), 0 0 50px rgba(168,85,247,0.25); }
      50%      { box-shadow: 0 0 32px var(--purple), 0 0 70px rgba(168,85,247,0.4); }
    }

    .card-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem;
      color: #fff;
      text-shadow: 0 0 12px var(--purple-glow);
      letter-spacing: 0.06em;
    }

    /* WAVY UNDERLINE LINK */
    .wave-link {
      position: relative;
      display: inline-block;
      color: var(--purple);
      text-decoration: none;
      font-family: 'Raleway', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      padding-bottom: 6px;
    }
    .wave-link svg {
      position: absolute;
      left: 0; bottom: 0;
      width: 100%;
      height: 6px;
      overflow: visible;
    }
    .wave-link path {
      fill: none;
      stroke: var(--purple);
      stroke-width: 1.8;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      transition: stroke-dashoffset 0.8s ease;
    }
    .wave-link:hover path,
    .wave-link.animate path {
      stroke-dashoffset: 0;
    }

    /* GO TO CHAT BUTTON */
    .btn-chat {
      display: inline-block;
      background: linear-gradient(135deg, var(--purple-dim), var(--purple));
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      padding: 0.7rem 2rem;
      border-radius: 2rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 14px var(--purple-glow), 0 0 30px rgba(168,85,247,0.2);
      transition: box-shadow 0.3s, transform 0.2s;
    }
    .btn-chat:hover {
      box-shadow: 0 0 24px var(--purple), 0 0 60px rgba(168,85,247,0.45);
      transform: translateY(-2px);
    }

    /* TESTERS GRID */
    .tester-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }
    .tester-card img {
      width: clamp(80px, 22vw, 110px);
      height: clamp(80px, 22vw, 110px);
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--purple-dim);
      box-shadow: 0 0 14px rgba(168,85,247,0.3);
    }
  </style>
</head>
<body>

  <!-- ── MAIN PAGE ── -->
  <div id="main-page">
    <h1 class="welcome">Добро пожаловать</h1>

    <div class="wave-wrap">
      <svg class="wave-svg" viewBox="0 0 700 50" preserveAspectRatio="none" height="50">
        <path class="wave-path" id="mainWave"
          d="M0,25 C35,5 70,45 105,25 C140,5 175,45 210,25 C245,5 280,45 315,25
             C350,5 385,45 420,25 C455,5 490,45 525,25 C560,5 595,45 630,25 C665,5 700,25 700,25"/>
      </svg>
    </div>
  </div>

  <!-- ── CREATOR BUTTON ── -->
  <button class="btn-creator" onclick="openOverlay()">создатель</button>

  <!-- ── FULLSCREEN OVERLAY ── -->
  <div id="overlay">
    <div class="overlay-inner">
      <button class="btn-close" onclick="closeOverlay()">✕</button>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('creator', this)">Создатель</button>
        <button class="tab-btn" onclick="switchTab('testers', this)">Тестеры</button>
      </div>

      <!-- PANEL: CREATOR -->
      <div class="tab-panel active" id="panel-creator">
        <img class="avatar" src="photo.png" alt="Создатель"
             onerror="this.src='https://via.placeholder.com/150/7c3aed/fff?text=?'"/>
        <div class="card-name">Создатель</div>

        <a class="btn-chat" href="https://t.me/tocim" target="_blank">Перейти в чат →</a>
      </div>

      <!-- PANEL: TESTERS -->
      <div class="tab-panel" id="panel-testers">
        <div class="tester-card">
          <img src="photo1.png" alt="Тестер 1"
               onerror="this.src='https://via.placeholder.com/110/7c3aed/fff?text=T1'"/>
          <div class="card-name" style="font-size:0.85rem;">Тестер 1</div>
          <a class="btn-chat" href="https://t.me/beskiye" target="_blank">Перейти в чат →</a>
        </div>
        <div class="tester-card">
          <img src="photo2.png" alt="Тестер 2"
               onerror="this.src='https://via.placeholder.com/110/7c3aed/fff?text=T2'"/>
          <div class="card-name" style="font-size:0.85rem;">Тестер 2</div>
          <a class="btn-chat" href="https://t.me/Mol0k000" target="_blank">Перейти в чат →</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── Set wave dash length precisely ──
    const wavePath = document.getElementById('mainWave');
    const len = wavePath.getTotalLength();
    wavePath.style.setProperty('--wave-len', len);
    wavePath.style.strokeDasharray = len;
    wavePath.style.strokeDashoffset = len;

    // Force reflow so animation replays each load
    void wavePath.getBoundingClientRect();
    wavePath.style.animation = 'none';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        wavePath.style.animation = `drawWave 2.6s cubic-bezier(.4,0,.2,1) forwards`;
      });
    });

    // ── Overlay ──
    function openOverlay() {
      document.getElementById('overlay').classList.add('open');
      // Animate wave links inside overlay
      document.querySelectorAll('.wave-link path').forEach(p => {
        p.style.transition = 'none';
        p.style.strokeDashoffset = '200';
        setTimeout(() => {
          p.style.transition = 'stroke-dashoffset 0.9s ease 0.3s';
          p.style.strokeDashoffset = '0';
        }, 50);
      });
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('open');
    }

    // Close on backdrop click
    document.getElementById('overlay').addEventListener('click', function(e) {
      if (e.target === this) closeOverlay();
    });

    // ── Tabs ──
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');

      // re-animate wave links on tab switch
      const panel = document.getElementById('panel-' + name);
      panel.querySelectorAll('.wave-link path').forEach(p => {
        p.style.transition = 'none';
        p.style.strokeDashoffset = '200';
        setTimeout(() => {
          p.style.transition = 'stroke-dashoffset 0.9s ease 0.2s';
          p.style.strokeDashoffset = '0';
        }, 50);
      });
    }
  </script>
</body>
</html>
